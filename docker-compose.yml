version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: compta_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - compta_net
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:1.25-alpine
    container_name: compta_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - compta_net
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    container_name: compta_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-compta_saas}
      POSTGRES_USER: ${DB_USERNAME:-compta_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - compta_net

  redis:
    image: redis:7-alpine
    container_name: compta_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-secret}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - compta_net

  horizon:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: compta_horizon
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan horizon
    volumes:
      - .:/var/www
    networks:
      - compta_net
    depends_on:
      - app
      - redis

  minio:
    image: minio/minio:latest
    container_name: compta_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - compta_net

  n8n:
    image: n8nio/n8n:latest
    container_name: compta_n8n
    restart: unless-stopped
    # AUCUN PORT EXPOSE — reseau interne uniquement
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:-n8n_secret}
      WEBHOOK_URL: http://n8n:5678
      N8N_HOST: n8n
      N8N_PORT: 5678
      NODE_ENV: production
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - compta_net

networks:
  compta_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  n8n_data:
