name: Deploy — Hostinger (Production)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_migrations:
        description: 'Exécuter les migrations'
        required: false
        default: 'true'
        type: boolean

jobs:
  deploy:
    name: Deploy to Hostinger Shared Hosting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH to Hostinger
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          timeout: 180s
          script: |
            set -e

            APP_DIR="${{ secrets.HOSTINGER_APP_PATH }}"
            echo "=== Déploiement vers $APP_DIR ==="

            cd "$APP_DIR"

            # Pull depuis Git
            git fetch origin main
            git reset --hard origin/main

            # Installer Composer si nécessaire
            if [ ! -f "$HOME/composer.phar" ]; then
              curl -sS https://getcomposer.org/installer | php -- --install-dir="$HOME" --filename=composer.phar
            fi

            # Installer les dépendances PHP
            php "$HOME/composer.phar" install --no-interaction --prefer-dist --optimize-autoloader --no-dev 2>&1 || \
            php "$HOME/composer.phar" update --no-interaction --prefer-dist --optimize-autoloader --no-dev

            # Migrations
            if [ "${{ github.event.inputs.run_migrations }}" != "false" ]; then
              echo "Exécution des migrations..."
              php artisan migrate --force
            fi

            # Vider et reconstruire les caches
            php artisan config:clear
            php artisan config:cache
            php artisan route:clear
            php artisan route:cache
            php artisan view:clear
            php artisan view:cache

            # Permissions storage
            chmod -R 775 storage bootstrap/cache

            echo "=== Déploiement terminé avec succès ==="
